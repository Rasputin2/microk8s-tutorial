services:
  backend:
    build:
      context: ./src/backend
    container_name: backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./src/frontend
    container_name: frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend