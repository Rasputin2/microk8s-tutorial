apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: test-my-cluster-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/rasputin2/backend:a727111545742caf008ed7fef03b4d5b91222b08
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: test-my-cluster-site
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
